name: Run Zulip Bot

permissions:
  contents: read

on:
  workflow_dispatch:

# Prevent overlapping bot starts on the same ref. The currently-running
# instance is cancelled when a new dispatch arrives.
concurrency:
  group: run-zulip-bot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest

    env:
      ZULIP_RC_CONTENT: ${{ secrets.ZULIP_RC }}
      ZULIP_BOT_CONFIG_CONTENT: ${{ secrets.ZULIP_BOT_CONFIG }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write Zulip rc + config from secrets to runner temp
        if: env.ZULIP_RC_CONTENT != ''
        run: |
          set -euo pipefail
          ZULIPRC="$RUNNER_TEMP/.zuliprc"
          umask 077
          printf '%s\n' "$ZULIP_RC_CONTENT" > "$ZULIPRC"
          chmod 600 "$ZULIPRC"
          echo "ZULIP_CONFIG_FILE=$ZULIPRC" >> "$GITHUB_ENV"
          if [ -n "${ZULIP_BOT_CONFIG_CONTENT:-}" ]; then
            CFG="$RUNNER_TEMP/config.yaml"
            printf '%s\n' "$ZULIP_BOT_CONFIG_CONTENT" > "$CFG"
            chmod 600 "$CFG"
            echo "ZULIP_BOT_VC_CONFIG=$CFG" >> "$GITHUB_ENV"
          fi

      - name: Run Zulip bot
        run: python bot_main.py

      - name: Shred secrets
        if: always()
        run: |
          set +e
          shred -u "$RUNNER_TEMP/.zuliprc" 2>/dev/null
          shred -u "$RUNNER_TEMP/config.yaml" 2>/dev/null
          true
